name: Build, Test and publish Containers

on:
  pull_request:
    paths:
      - "**/Dockerfile"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "tests/**"
  workflow_dispatch:

# Ensure only one build runs at a time per branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Determine which tool/version pairs need building ─────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed Dockerfiles
        id: changes
        run: |
          set -euo pipefail

          # ── Determine diff base ────────────────────────────────
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
          else
            BASE=""
          fi

          # ── Helper: list every tool/version in the repo ────────
          all_pairs() {
            find . -mindepth 3 -maxdepth 3 -name Dockerfile \
              -not -path './.github/*' \
              -printf '%P\n' | sed 's|/Dockerfile$||' | sort -u
          }

          # ── Helper: highest version for a given tool ───────────
          latest_version() {
            local tool="$1"
            find "$tool" -maxdepth 1 -mindepth 1 -type d 2>/dev/null \
              -printf '%f\n' | sort -V | tail -1 || true
          }

          # ── Collect pairs to build ─────────────────────────────
          # PUSHABLE_PAIRS: Dockerfile changed → build + push
          # PAIRS: all pairs that need building/testing (superset)
          NULL_SHA="0000000000000000000000000000000000000000"
          if [[ -z "$BASE" || "$BASE" == "$NULL_SHA" ]]; then
            # workflow_dispatch or initial push → build and push everything
            PAIRS=$(all_pairs)
            PUSHABLE_PAIRS="$PAIRS"
          else
            CHANGED=$(git diff --name-only "$BASE" HEAD)
            PAIRS=""
            PUSHABLE_PAIRS=""

            # Dockerfiles that changed → build + push that specific version
            DF_PAIRS=$(echo "$CHANGED" | \
              grep -E '^[^./][^/]*/[^/]+/Dockerfile$' | \
              sed 's|/Dockerfile$||' || true)
            PAIRS=$(printf '%s\n%s' "$PAIRS" "$DF_PAIRS")
            PUSHABLE_PAIRS=$(printf '%s\n%s' "$PUSHABLE_PAIRS" "$DF_PAIRS")

            # Test script changed → test ALL versions of that tool (no push)
            TOOLS=$(echo "$CHANGED" | \
              grep -E '^tests/[^/]+/' | \
              sed 's|^tests/||; s|/.*||' | sort -u || true)
            for tool in $TOOLS; do
              if [[ -d "$tool" ]]; then
                for dir in "$tool"/*/; do
                  [[ -f "${dir}Dockerfile" ]] && \
                    PAIRS=$(printf '%s\n%s' "$PAIRS" "${dir%/}")
                done
              fi
            done

            # Deduplicate and drop blank lines
            PAIRS=$(echo "$PAIRS" | grep -v '^$' | sort -u || true)
            PUSHABLE_PAIRS=$(echo "$PUSHABLE_PAIRS" | grep -v '^$' | sort -u || true)
          fi

          # ── Build JSON matrix with latest + pushable flags ─────
          if [[ -z "$PAIRS" ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            INCLUDES="[]"
            for pair in $PAIRS; do
              TOOL="${pair%%/*}"
              VERSION="${pair#*/}"
              LATEST=$(latest_version "$TOOL")
              if echo "$PUSHABLE_PAIRS" | grep -qx "$pair"; then
                PUSHABLE=true
              else
                PUSHABLE=false
              fi
              if [[ "$VERSION" == "$LATEST" ]]; then
                INCLUDES=$(echo "$INCLUDES" | \
                  jq --arg t "$TOOL" --arg v "$VERSION" --argjson p "$PUSHABLE" \
                  '. + [{"tool": $t, "version": $v, "latest": true, "pushable": $p}]')
              else
                INCLUDES=$(echo "$INCLUDES" | \
                  jq --arg t "$TOOL" --arg v "$VERSION" --argjson p "$PUSHABLE" \
                  '. + [{"tool": $t, "version": $v, "pushable": $p}]')
              fi
            done
            MATRIX=$(echo "$INCLUDES" | jq -c '{include: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build, test & push only the changed images ──────────────
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image locally
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.tool }}/${{ matrix.version }}
          load: true
          tags: test/${{ matrix.tool }}:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run functional tests
        run: |
          chmod +x tests/${{ matrix.tool }}/test.sh
          tests/${{ matrix.tool }}/test.sh \
            "test/${{ matrix.tool }}:${{ matrix.version }}" \
            "${{ matrix.version }}"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.pushable == true
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.pushable == true
        id: tags
        run: |
          IMAGE=$(echo "${{ env.IMAGE_PREFIX }}/${{ matrix.tool }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ matrix.version }}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"

          # Every build gets the exact version tag
          TAGS="${IMAGE}:${VERSION}"

          # The entry marked latest also gets :major, :minor, and :latest
          if [[ "${{ matrix.latest }}" == "true" ]]; then
            TAGS="${TAGS},${IMAGE}:${MAJOR},${IMAGE}:${MINOR},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.pushable == true
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.tool }}/${{ matrix.version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max