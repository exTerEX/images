name: Build, Test and publish Containers

on:
  pull_request:
    paths:
      - "**/Dockerfile"
      - "tests/**"
      - "shared/**"
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "tests/**"
      - "shared/**"
  workflow_dispatch:

# Ensure only one build runs at a time per branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ‚îÄ‚îÄ Determine which tool/version pairs need building ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_changes: ${{ steps.changes.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed Dockerfiles
        id: changes
        run: |
          set -euo pipefail

          # ‚îÄ‚îÄ Determine diff base ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE="${{ github.event.before }}"
          else
            BASE=""
          fi

          # ‚îÄ‚îÄ Helper: list every tool/version in the repo ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
          all_pairs() {
            find . -mindepth 3 -maxdepth 3 -name Dockerfile \
              -not -path './.github/*' \
              -printf '%P\n' | sed 's|/Dockerfile$||' | sort -u
          }

          # ‚îÄ‚îÄ Helper: highest version for a given tool ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
          latest_version() {
            local tool="$1"
            ls -d "${tool}"/*/ 2>/dev/null | \
              xargs -I{} basename {} | sort -V | tail -1
          }

          # ‚îÄ‚îÄ Collect pairs to build ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
          NULL_SHA="0000000000000000000000000000000000000000"
          if [[ -z "$BASE" || "$BASE" == "$NULL_SHA" ]]; then
            # workflow_dispatch or initial push ‚Üí build everything
            PAIRS=$(all_pairs)
          else
            CHANGED=$(git diff --name-only "$BASE" HEAD)

            # If shared/ changed ‚Üí rebuild everything
            if echo "$CHANGED" | grep -q '^shared/'; then
              PAIRS=$(all_pairs)
            else
              PAIRS=""

              # Dockerfiles that changed ‚Üí build that specific version
              DF_PAIRS=$(echo "$CHANGED" | \
                grep -E '^[^./][^/]*/[^/]+/Dockerfile$' | \
                sed 's|/Dockerfile$||' || true)
              PAIRS=$(printf '%s\n%s' "$PAIRS" "$DF_PAIRS")

              # Test script changed ‚Üí rebuild ALL versions of that tool
              TOOLS=$(echo "$CHANGED" | \
                grep -E '^tests/[^/]+/' | \
                sed 's|^tests/||; s|/.*||' | sort -u || true)
              for tool in $TOOLS; do
                if [[ -d "$tool" ]]; then
                  for dir in "$tool"/*/; do
                    [[ -f "${dir}Dockerfile" ]] && \
                      PAIRS=$(printf '%s\n%s' "$PAIRS" "${dir%/}")
                  done
                fi
              done

              # Deduplicate and drop blank lines
              PAIRS=$(echo "$PAIRS" | grep -v '^$' | sort -u || true)
            fi
          fi

          # ‚îÄ‚îÄ Build JSON matrix with latest flag ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
          if [[ -z "$PAIRS" ]]; then
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            INCLUDES="[]"
            for pair in $PAIRS; do
              TOOL="${pair%%/*}"
              VERSION="${pair#*/}"
              LATEST=$(latest_version "$TOOL")
              if [[ "$VERSION" == "$LATEST" ]]; then
                INCLUDES=$(echo "$INCLUDES" | \
                  jq --arg t "$TOOL" --arg v "$VERSION" \
                  '. + [{"tool": $t, "version": $v, "latest": true}]')
              else
                INCLUDES=$(echo "$INCLUDES" | \
                  jq --arg t "$TOOL" --arg v "$VERSION" \
                  '. + [{"tool": $t, "version": $v}]')
              fi
            done
            MATRIX=$(echo "$INCLUDES" | jq -c '{include: .}')
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ‚îÄ‚îÄ Build, test & push only the changed images ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image locally
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.tool }}/${{ matrix.version }}
          load: true
          tags: test/${{ matrix.tool }}:${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run functional tests
        run: |
          chmod +x tests/${{ matrix.tool }}/test.sh
          tests/${{ matrix.tool }}/test.sh \
            "test/${{ matrix.tool }}:${{ matrix.version }}" \
            "${{ matrix.version }}"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: tags
        run: |
          IMAGE=$(echo "${{ env.IMAGE_PREFIX }}/${{ matrix.tool }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ matrix.version }}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"

          # Every build gets the exact version tag
          TAGS="${IMAGE}:${VERSION}"

          # The entry marked latest also gets :major, :minor, and :latest
          if [[ "${{ matrix.latest }}" == "true" ]]; then
            TAGS="${TAGS},${IMAGE}:${MAJOR},${IMAGE}:${MINOR},${IMAGE}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.tool }}/${{ matrix.version }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max